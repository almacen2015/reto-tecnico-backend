server:
  port: 8080

spring:
  application:
    name: ms-client
  datasource:
    url: jdbc:postgresql://localhost:5433/clientdb
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG